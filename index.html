<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at center, #2b0a25 0%, #120014 70%, #050006 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  #stage {
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Botão inicial */
  #startBtn {
    z-index:50;
    padding:18px 42px;
    font-size:1.3rem;
    font-weight:bold;
    color:#fff;
    background:linear-gradient(135deg,#ff3b6b,#b3001b);
    border:none;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 0 25px rgba(255,59,107,0.6);
    transition:transform .2s ease, box-shadow .2s ease;
    letter-spacing:1px;
  }
  #startBtn:hover {
    transform:scale(1.07);
    box-shadow:0 0 40px rgba(255,59,107,0.9);
  }
  #startBtn:active { transform:scale(0.95); }

  /* Canvas de confetes/corações */
  #fxCanvas {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:30;
  }

  /* Balões */
  .balloon {
    position:fixed;
    bottom:-150px;
    width:60px;
    height:80px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    pointer-events:none;
    z-index:20;
    opacity:0.95;
    box-shadow: inset -8px -8px 15px rgba(0,0,0,0.25), inset 8px 8px 15px rgba(255,255,255,0.25);
  }
  .balloon::after {
    content:'';
    position:absolute;
    bottom:-40px;
    left:50%;
    width:2px;
    height:40px;
    background:rgba(255,255,255,0.5);
    transform:translateX(-50%);
  }

  /* Imagem final */
  #photoWrap {
    position:absolute;
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    opacity:0;
    transform:scale(0.7);
    transition:opacity 1.1s ease, transform 1.1s ease;
  }
  #photoWrap.show {
    opacity:1;
    transform:scale(1);
  }

  #photoFrame {
    width:min(85vw, 360px);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 0 6px #fff, 0 0 40px rgba(255,59,107,0.7), 0 25px 60px rgba(0,0,0,0.6);
  }
  #photoFrame img {
    width:100%;
    display:block;
  }

  #caption {
    margin-top:22px;
    color:#ffd9e3;
    font-size:1.4rem;
    text-shadow:0 0 12px rgba(255,59,107,0.8);
    text-align:center;
    font-style:italic;
  }

  @keyframes float {
    0%   { transform: translateY(0) rotate(0deg); }
    50%  { transform: translateY(-25px) rotate(4deg); }
    100% { transform: translateY(0) rotate(0deg); }
  }
</style>
</head>

    <div id="caption">Feita pra brilhar ✨💖</div>
  </div>
</div>

<canvas id="fxCanvas"></canvas>

<script>
(function(){
  const startBtn   = document.getElementById('startBtn');
  const photoWrap  = document.getElementById('photoWrap');
  const canvas     = document.getElementById('fxCanvas');
  const ctx        = canvas.getContext('2d');

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- Partículas (confetes + corações) ----------
  const colors = ['#ff3b6b','#ffd166','#06d6a0','#118ab2','#ef476f','#ffffff','#b3001b'];
  let particles = [];

  function rand(min, max){ return Math.random() * (max - min) + min; }

  function createParticle(){
    const isHeart = Math.random() < 0.35;
    return {
      x: rand(0, canvas.width),
      y: rand(-canvas.height, 0),
      size: isHeart ? rand(10, 20) : rand(6, 12),
      color: colors[Math.floor(rand(0, colors.length))],
      speedY: rand(2, 5),
      speedX: rand(-1.5, 1.5),
      rotation: rand(0, 360),
      rotationSpeed: rand(-6, 6),
      isHeart: isHeart,
      shape: Math.random() < 0.5 ? 'rect' : 'circle',
      life: 0,
      maxLife: rand(160, 260)
    };
  }

  function drawHeart(p){
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.fillStyle = p.color;
    const s = p.size / 14;
    ctx.beginPath();
    ctx.moveTo(0, 4*s);
    ctx.bezierCurveTo(0, 0, -8*s, 0, -8*s, 5*s);
    ctx.bezierCurveTo(-8*s, 9*s, -4*s, 11*s, 0, 16*s);
    ctx.bezierCurveTo(4*s, 11*s, 8*s, 9*s, 8*s, 5*s);
    ctx.bezierCurveTo(8*s, 0, 0, 0, 0, 4*s);
    ctx.fill();
    ctx.restore();
  }

  function drawParticle(p){
    if(p.isHeart){
      drawHeart(p);
      return;
    }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.fillStyle = p.color;
    if(p.shape === 'rect'){
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0,0,p.size/2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  let animId = null;
  let spawning = false;

  function animateParticles(){
    ctx.clearRect(0,0,canvas.width, canvas.height);

    if(spawning && particles.length < 260){
      for(let i=0;i<4;i++) particles.push(createParticle());
    }

    particles.forEach(p=>{
      p.x += p.speedX;
      p.y += p.speedY;
      p.rotation += p.rotationSpeed;
      p.life++;
      drawParticle(p);
    });

    particles = particles.filter(p => p.life < p.maxLife && p.y < canvas.height + 50);

    animId = requestAnimationFrame(animateParticles);
  }

  // ---------- Balões ----------
  function spawnBalloon(){
    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    const hue = colors[Math.floor(rand(0, colors.length))];
    balloon.style.background = `linear-gradient(135deg, ${hue}, #ffffff33)`;
    const left = rand(2, 92);
    const duration = rand(5, 8);
    const delay = rand(0, 0.6);
    const drift = rand(-40, 40);

    balloon.style.left = left + 'vw';
    balloon.style.animation = `floatUp ${duration}s ease-in ${delay}s forwards`;
    document.body.appendChild(balloon);

    balloon.animate(
      [
        { transform: `translate(0,0) rotate(0deg)`, bottom:'-150px', offset:0 },
      ],
      { duration: duration*1000, delay: delay*1000, fill:'forwards' }
    );

    // animação manual via requestAnimationFrame para subir + oscilar
    let start = null;
    function step(ts){
      if(!start) start = ts;
      const elapsed = (ts - start)/1000 - delay;
      if(elapsed < 0){ requestAnimationFrame(step); return; }
      const progress = elapsed / duration;
      if(progress >= 1.1){
        balloon.remove();
        return;
      }
      const bottom = -150 + progress * (window.innerHeight + 250);
      const sway = Math.sin(progress * Math.PI * 4) * drift;
      balloon.style.bottom = bottom + 'px';
      balloon.style.transform = `translateX(${sway}px) rotate(${sway/4}deg)`;
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function launchBalloons(count){
    for(let i=0;i<count;i++){
      setTimeout(spawnBalloon, i * 90);
    }
  }

  // ---------- Sequência principal ----------
  startBtn.addEventListener('click', () => {
    startBtn.style.transition = 'opacity .4s ease, transform .4s ease';
    startBtn.style.opacity = '0';
    startBtn.style.transform = 'scale(0.5)';
    setTimeout(() => startBtn.remove(), 400);

    spawning = true;
    animateParticles();
    launchBalloons(18);

    // depois da explosão, mostra a foto
    setTimeout(() => {
      photoWrap.classList.add('show');
    }, 900);

    // reduz/encerra geração de novas partículas após um tempo
    setTimeout(() => { spawning = false; }, 3500);
  });
})();
</script>
